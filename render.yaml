services:
  - type: web
    name: inventory-sales-app
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn \"app:create_app()\""
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: inventory-db
    databaseName: purchasesalesdb
    user: postgres
    plan: free
