{% extends 'base.html' %}
{% block title %}Categories{% endblock %}
{% block content %}
<div class="page-header">
  <h2>Categories</h2>
  <div class="page-header-actions">
    <a href="{{ url_for('products.add_category') }}" class="btn btn-primary">Add Category</a>
  </div>
</div>

<div class="glass-card">
  <div class="table-responsive">
    <table class="table table-bordered table-striped table-cards">
      <thead>
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for category in categories %}
        <tr>
          <td data-label="Name">{{ category.name }}</td>
          <td data-label="Description">{{ category.description }}</td>
          <td data-label="" class="cell-actions">
            <a href="{{ url_for('products.edit_category', category_id=category.id) }}" class="btn btn-sm btn-warning">Edit</a>
            <form action="{{ url_for('products.delete_category', category_id=category.id) }}" method="post" style="display:inline;">
              <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this category?');">Delete</button>
            </form>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
