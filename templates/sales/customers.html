{% extends 'base.html' %}
{% block title %}Customers{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Customers</h2>
  <a href="{{ url_for('sales.add_customer') }}" class="btn btn-primary">Add Customer</a>
</div>
<table class="table table-bordered table-striped">
  <thead>
    <tr>
      <th>Name</th>
      <th>Phone</th>
      <th>Email</th>
      <th>Address</th>
      <th>Actions</th>
    </tr>
  </thead>
  <tbody>
    {% for customer in customers %}
    <tr>
      <td>{{ customer.name }}</td>
      <td>{{ customer.phone }}</td>
      <td>{{ customer.email }}</td>
      <td>{{ customer.address }}</td>
      <td>
        <a href="{{ url_for('sales.edit_customer', customer_id=customer.id) }}" class="btn btn-sm btn-warning">Edit</a>
        <form action="{{ url_for('sales.delete_customer', customer_id=customer.id) }}" method="post" style="display:inline;">
          <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this customer?');">Delete</button>
        </form>
      </td>
    </tr>
    {% endfor %}
  </tbody>
</table>
{% endblock %}
